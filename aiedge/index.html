<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>על קצה הבינה | מכללת בית ברל</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  
  <script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"></script>

  <link rel="stylesheet" href="lectures.css">

  <style>
    body { 
      font-family: 'Assistant', sans-serif; 
    }
    
    .hero-bg-image {
      background-image: url('lectures.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }
  </style>
</head>
<body class="min-h-screen bg-slate-50 text-slate-900 transition-colors">

  <header class="bg-white shadow-sm sticky top-0 z-40">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center h-16">
        <a href="https://www.beitberl.ac.il/" target="_blank" rel="noopener noreferrer" 
           class="flex items-center gap-2 text-indigo-800 hover:text-indigo-600 transition-colors">
          <i data-lucide="graduation-cap" class="w-8 h-8"></i>
          <span id="logo-text" class="font-bold text-lg hidden sm:block">מכללת בית ברל</span>
        </a>

        <div class="flex items-center gap-4 relative">
          <div class="relative">
            <button id="contact-btn" onclick="toggleContact(event)"
              class="flex items-center gap-2 px-3 py-2 rounded-md hover:bg-slate-100 transition-colors text-sm font-medium">
              <i data-lucide="message-circle" class="w-4 h-4"></i>
              <span id="contact-text" class="hidden sm:inline">צור קשר</span>
              <i data-lucide="chevron-down" class="w-4 h-4"></i>
            </button>
            <div id="contact-menu" class="hidden absolute top-full mt-1 w-48 bg-white border border-slate-200 rounded-lg shadow-lg py-1 left-0 rtl:right-0 rtl:left-auto">
              <a href="mailto:yishay.mor@beitberl.ac.il" class="flex items-center gap-3 px-4 py-2 text-sm text-slate-700 hover:bg-slate-50">
                <i data-lucide="mail" class="w-4 h-4 text-indigo-600"></i>
                <span id="mail-text">שלח דוא"ל לישי מור</span>
              </a>
              <a href="https://wa.me/972526514574" target="_blank" rel="noopener noreferrer" class="flex items-center gap-3 px-4 py-2 text-sm text-slate-700 hover:bg-slate-50">
                <i data-lucide="phone" class="w-4 h-4 text-green-600"></i>
                <span id="whatsapp-text">וואטסאפ לישי מור</span>
              </a>
            </div>
          </div>

          <div class="flex items-center gap-2 border-s border-slate-300 ps-4">
            <i data-lucide="globe" class="w-4 h-4 text-slate-500"></i>
            <select id="lang-select" onchange="changeLanguage(this.value)"
              class="bg-transparent text-sm font-medium focus:outline-none cursor-pointer">
              <option value="he" selected>עברית</option>
              <option value="en">English</option>
              <option value="ar">العربية</option>
            </select>
          </div>
        </div>
      </div>
    </div>
  </header>

  <section class="relative hero-bg-image text-white overflow-hidden py-10 sm:py-16">
    <div class="absolute inset-0 bg-slate-900/70"></div>
    
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10">
      <div class="max-w-3xl">
        <span id="hero-badge" class="inline-block py-1 px-3 rounded-full bg-indigo-500/40 border border-indigo-400/30 text-indigo-100 text-xs font-medium mb-3 tracking-wide backdrop-blur-sm">
          מפגשי זום (Zoom) | ימי שלישי בשעה 18:30-19:30
        </span>
        <h1 id="hero-title" class="text-3xl sm:text-4xl md:text-5xl font-extrabold tracking-tight mb-4 drop-shadow-md">
          על קצה הבינה
        </h1>
        <p id="hero-subtitle" class="text-lg sm:text-xl text-indigo-50 font-light mb-8 leading-relaxed drop-shadow-sm">
          סדרת הרצאות אורח על בינה מלאכותית בחינוך
        </p>
        
        <div class="flex flex-wrap gap-3">
          <button onclick="openModal('register')"
            class="flex items-center gap-2 px-5 py-2.5 bg-white text-indigo-900 font-bold rounded-lg shadow-lg hover:bg-indigo-50 transition-all transform hover:-translate-y-0.5 text-sm">
            <i data-lucide="user-plus" class="w-4 h-4"></i>
            <span id="hero-btn-register">הרשמה להרצאות</span>
          </button>
          <button onclick="openModal('about')"
            class="flex items-center gap-2 px-5 py-2.5 bg-indigo-800/60 border border-indigo-400/30 text-white font-medium rounded-lg hover:bg-indigo-700/70 transition-all backdrop-blur-md text-sm">
            <i data-lucide="info" class="w-4 h-4"></i>
            <span id="hero-btn-about">אודות הסדרה</span>
          </button>
        </div>
      </div>
    </div>
  </section>

  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
    <div class="flex items-center gap-3 mb-8">
      <i data-lucide="book-open" class="w-7 h-7 text-indigo-600"></i>
      <h2 id="talks-title" class="text-2xl font-bold text-slate-800">הרצאות האורח שלנו</h2>
    </div>
    
    <div id="talks-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
      </div>
  </main>

  <footer class="bg-slate-900 text-slate-400 py-6 text-center text-xs">
    <p id="footer-text">© 2026 מכללת בית ברל. על קצה הבינה.</p>
  </footer>

  <div id="modal-overlay" class="fixed inset-0 z-50 hidden items-center justify-center p-4 modal-enter">
    <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm cursor-pointer" onclick="closeModal()"></div>
    <div class="relative bg-white rounded-2xl shadow-2xl max-w-3xl w-full max-h-[90vh] flex flex-col overflow-hidden modal-content-enter">
      
      <div class="flex items-center justify-between p-4 border-b border-slate-100 shrink-0">
        <h2 id="modal-title" class="text-xl font-bold text-slate-900">כותרת</h2>
        <button onclick="closeModal()" class="p-2 rounded-full hover:bg-slate-100 text-slate-500 transition-colors">
          <i data-lucide="x" class="w-5 h-5"></i>
        </button>
      </div>

      <div id="modal-body" class="p-4 sm:p-6 overflow-y-auto w-full">
        </div>
      
      <div id="modal-footer" class="hidden p-4 sm:p-6 border-t border-slate-100 bg-slate-50 justify-end shrink-0">
        </div>
    </div>
  </div>

  <script src="lectures.js"></script>

</body>
</html>
