<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>פסטיבל בינה מלאכותית 2026</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>

    <header class="hero-section">
        <div class="container hero-flex-container">
            <div class="hero-text-area">
                <h1 id="event-title">טוען כותרת...</h1>
                <p class="event-meta"><span id="event-date"></span> | <span id="event-location"></span></p>
            </div>
            
            <div class="hero-partners-box">
                <span class="partners-label">בחסות ובשיתוף פעולה של:</span>
                <div class="hero-logos-row">
                    <a href="https://www.beitberl.ac.il" target="_blank" rel="noopener noreferrer" class="partner-link" title="מעבר לאתר המכללה האקדמית בית ברל">
                        <img src="bb-logo.png" alt="לוגו המכללה האקדמית בית ברל" class="partner-logo">
                    </a>
                    <a href="https://meital.iucc.ac.il" target="_blank" rel="noopener noreferrer" class="partner-link" title="מעבר לאתר מיט&quot;ל">
                        <img src="meital-logo.jpg" alt="לוגו מיט&quot;ל" class="partner-logo">
                    </a>
                    <a href="https://about.google/intl/iw/" target="_blank" rel="noopener noreferrer" class="partner-link" title="מעבר לאתר Google AI">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/2/2f/Google_2015_logo.svg" alt="לוגו Google" class="partner-logo logo-brightness">
                    </a>
                </div>
            </div>
        </div>
    </header>

    <main class="container">
        
        <div class="main-content-layout">
            
            <div class="content-primary">
                <section class="card blurb-card">
                    <h2>אודות הפסטיבל</h2>
                    <p id="event-blurb">טוען תוכן...</p>
                </section>

                <section class="card community-box">
                    <h2>קהילת סוכני שינוי</h2>
                    <p id="community-brief">טוען תקציר קהילה...</p>
                    <button class="btn" id="read-more-community">קראו עוד..</button>
                </section>
            </div>

            <aside class="sidebar-schedule">
                <section class="card schedule-card">
                    <h2>תוכנית האירוע</h2>
                    <div id="schedule-timeline" class="timeline"></div>
                </section>
            </aside>
            
        </div>

        <section class="carousel-section">
            <h2>פרויקטים של חברי הקהילה</h2>
            <div class="carousel-wrapper">
                <button class="carousel-btn prev-btn" onclick="moveCarousel(-1)">&#10095;</button>
                <div class="carousel-track-container">
                    <div id="carousel-track" class="carousel-track"></div>
                </div>
                <button class="carousel-btn next-btn" onclick="moveCarousel(1)">&#10094;</button>
            </div>
        </section>
    </main>

    <footer class="main-footer">
        <p>פסטיבל בינה מלאכותית 2026 | המכללה האקדמית בית ברל, מיט"ל ו-Google</p>
    </footer>

    <div id="custom-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal" id="close-modal-btn">&times;</span>
            <div id="modal-body-content"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
