
<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>יום בינה מלאכותית 2026</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="video-bg-container">
        <video autoplay muted loop playsinline class="video-bg">
            <source src="robots_nursery_s.mpg" type="video/mp4">
            </video>
        <div class="video-overlay"></div>
    </div>

    <div class="app-container">
        <header class="main-header">
            <h1 id="main-title">טוען נתונים...</h1>
            <p class="event-date" id="event-date"></p>
            <div class="action-bar">
                <button class="btn btn-primary" id="open-register-btn">הרשמה לאירוע</button>
                <a href="#" id="main-zoom-btn" target="_blank" class="btn btn-secondary">כניסה למליאה (Zoom)</a>
            </div>
        </header>

        <main class="dashboard-grid">
            <div class="content-column">
                <section class="card profile-card">
                    <h2>הרצאת פתיחה</h2>
                    <div class="profile-layout">
                        <img src="https://images.squarespace-cdn.com/content/v1/5be405101aef1dc47f0786cf/1614761048684-TMT8X7RCOQOEZ44U6KIP/Zohar+Elyoseph.png" alt="פרופ׳ זוהר אליוסף" class="profile-img">
                        <div class="profile-details">
                            <h3 id="speaker-name"></h3>
                            <h4 id="speaker-inst"></h4>
                            <p id="speaker-bio"></p>
                        </div>
                    </div>
                </section>

                <section class="card">
                    <h2>סדנאות לבחירה (15:30)</h2>
                    <div class="grid-container" id="workshops-container"></div>
                </section>
                
                <section class="card">
                    <h2>קבוצות הדרכה והתנסות (17:00)</h2>
                    <div class="table-wrapper">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>מנחה</th>
                                    <th>מסלול / קבוצה</th>
                                    <th>קישור ומפגש</th>
                                </tr>
                            </thead>
                            <tbody id="groups-table-body"></tbody>
                        </table>
                    </div>
                </section>
            </div>

            <aside class="sidebar-column">
                <section class="card timeline-card">
                    <h2>סדר היום</h2>
                    <ul class="timeline" id="timeline-container"></ul>
                </section>
            </aside>
        </main>
    </div>

    <div class="modal-overlay" id="register-modal">
        <div class="modal-box">
            <button class="close-modal-btn" id="close-register-btn">&times;</button>
            <div class="modal-header">
                <h3>טופס רישום ליום עיון בינה מלאכותית</h3>
                <p>מלאו את הפרטים בטופס המאובטח להלן:</p>
            </div>
            <div class="modal-body">
                <iframe id="registration-iframe" src="" width="100%" height="500" frameborder="0" marginheight="0" marginwidth="0">טוען...</iframe>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
